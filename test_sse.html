<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Analyst — SSE Tester</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0c0c0e; color: #e2e2e5; min-height: 100vh; }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .sidebar { background: #111115; border-right: 1px solid #1e1e26; padding: 24px 16px; display: flex; flex-direction: column; gap: 6px; }
    .sidebar-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #44445a; padding: 0 8px; margin-bottom: 8px; }
    .nav-btn { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; border: none; background: transparent; color: #8888a0; cursor: pointer; font-size: 0.86rem; text-align: left; width: 100%; transition: background 0.15s, color 0.15s; }
    .nav-btn:hover { background: #1a1a22; color: #c0c0d8; }
    .nav-btn.active { background: #1a1a35; color: #7c9eff; border: 1px solid #2a2a55; }
    .nav-icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .main { padding: 28px 32px; overflow-y: auto; }
    .page-title { font-size: 1.1rem; font-weight: 600; color: #c8c8e0; margin-bottom: 6px; }
    .page-sub { font-size: 0.82rem; color: #44445a; margin-bottom: 24px; }

    /* ── Form elements ── */
    .form-card { background: #111115; border: 1px solid #1e1e26; border-radius: 12px; padding: 20px; margin-bottom: 16px; max-width: 680px; }
    .form-card-title { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #44445a; margin-bottom: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field label { font-size: 0.72rem; color: #55556a; text-transform: uppercase; letter-spacing: 0.04em; }
    .field input, .field textarea { padding: 8px 11px; background: #0c0c0e; border: 1px solid #22222e; border-radius: 7px; color: #dcdcf0; font-size: 0.85rem; width: 100%; outline: none; transition: border-color 0.15s; }
    .field input:focus, .field textarea:focus { border-color: #3a3aff55; }
    .field textarea { resize: vertical; min-height: 64px; font-family: inherit; line-height: 1.5; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    /* ── Buttons ── */
    .btn { padding: 8px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 0.83rem; font-weight: 500; transition: opacity 0.15s, background 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #2a2aff; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #3535ff; }
    .btn-ghost { background: #1a1a22; border: 1px solid #2a2a3a; color: #8888a0; }
    .btn-ghost:hover:not(:disabled) { background: #222230; }
    .btn-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }

    /* ── Step indicator (for RAG Ask flow) ── */
    .step-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #4a4a70; margin-bottom: 12px; }
    .step-dot { width: 6px; height: 6px; border-radius: 50%; background: #2a2aff; }
    .info-tag { display: inline-flex; align-items: center; gap: 5px; background: #0d1230; border: 1px solid #1a2060; border-radius: 5px; padding: 4px 9px; font-size: 0.76rem; color: #6677cc; margin-right: 6px; margin-top: 4px; }
    .info-tag .k { color: #3a3a70; }

    /* ── Activity Feed (Google ADK style) ── */
    .feed-section { max-width: 820px; margin-top: 20px; }
    .feed-header { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #44445a; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .feed-header-pulse { width: 6px; height: 6px; border-radius: 50%; background: #2a2aff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Progress bar */
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .progress-track { flex: 1; height: 2px; background: #1a1a26; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #2a2aff; border-radius: 2px; transition: width 0.4s ease; }
    .progress-msg { font-size: 0.75rem; color: #44445a; min-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Agent cards */
    .agent-card { background: #111115; border: 1px solid #1e1e26; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
    .card-header { display: flex; align-items: center; gap: 9px; padding: 10px 14px; border-bottom: 1px solid #1a1a22; }
    .card-icon { font-size: 1rem; width: 22px; text-align: center; flex-shrink: 0; }
    .card-label { font-size: 0.83rem; font-weight: 600; color: #b8b8d0; flex: 1; }
    .card-status { font-size: 0.72rem; margin-left: auto; display: flex; align-items: center; gap: 5px; }
    .card-status.running { color: #5555cc; }
    .card-status.done { color: #22cc66; }
    .status-spinner { width: 8px; height: 8px; border: 1.5px solid #2a2aff44; border-top-color: #2a2aff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-body { padding: 12px 14px; font-size: 0.82rem; line-height: 1.65; color: #9898b8; white-space: pre-wrap; word-break: break-word; min-height: 0; }
    .card-body:empty { display: none; }

    /* Tool call badge */
    .tool-badge { display: inline-flex; align-items: center; gap: 4px; background: #1a1500; border: 1px solid #332800; border-radius: 5px; padding: 2px 8px; font-size: 0.72rem; font-family: 'SF Mono', 'Fira Code', monospace; color: #aa8800; margin: 3px 2px; vertical-align: middle; }

    /* Blinking cursor */
    .cursor { display: inline-block; width: 2px; height: 0.85em; background: #6666cc; margin-left: 1px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Final answer panel */
    .answer-panel { background: #0d0d15; border: 1px solid #1e1e2e; border-radius: 12px; padding: 20px; margin-top: 16px; max-width: 820px; }
    .answer-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #44445a; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .answer-via { font-size: 0.72rem; background: #0d1230; border: 1px solid #1a2060; border-radius: 4px; padding: 2px 8px; color: #6677cc; text-transform: none; letter-spacing: 0; }
    .answer-text { font-size: 0.85rem; line-height: 1.7; color: #c8c8e0; white-space: pre-wrap; word-break: break-word; }
    .answer-meta { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
    .meta-chip { font-size: 0.72rem; background: #111115; border: 1px solid #1e1e26; border-radius: 4px; padding: 3px 8px; color: #44445a; }
    .chart-img { margin-top: 14px; max-width: 100%; border-radius: 8px; border: 1px solid #1e1e26; }
    .done-badge { display: inline-flex; align-items: center; gap: 5px; background: #041a0d; border: 1px solid #0a3a1a; border-radius: 5px; padding: 4px 10px; font-size: 0.72rem; color: #22cc66; margin-top: 12px; }

    /* Error box */
    .error-box { background: #1a0808; border: 1px solid #5a1a1a; border-radius: 8px; padding: 10px 14px; color: #ff6666; font-size: 0.82rem; margin-top: 10px; max-width: 680px; }

    /* Completed step indicator */
    .step-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #55556a; margin-bottom: 14px; }
    .step-check { width: 18px; height: 18px; border-radius: 50%; background: #041a0d; border: 1px solid #0a3a1a; display: flex; align-items: center; justify-content: center; color: #22cc66; font-size: 0.7rem; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const BASE = "http://localhost:8000";

    // ── Node display config ────────────────────────────────────────────────
    const NODE_CONFIG = {
      // Quant agents
      supervisor:               { icon: "🤖", color: "#6655ff" },
      ticker_finder_agent:      { icon: "🔎", color: "#f59e0b" },
      stock_information_agent:  { icon: "📊", color: "#10b981" },
      technical_analysis_agent: { icon: "📈", color: "#3b82f6" },
      research_agent:           { icon: "🔍", color: "#ec4899" },
      // RAG nodes
      detect_alpha:             { icon: "🧭", color: "#8855ff" },
      detect_scenario:          { icon: "🧭", color: "#8855ff" },
      preprocess:               { icon: "🔄", color: "#6655ff" },
      retrieve:                 { icon: "📄", color: "#2266ff" },
      grade_documents:          { icon: "⭐", color: "#f59e0b" },
      gap_analysis:             { icon: "🔍", color: "#6655ff" },
      web_search:               { icon: "🌐", color: "#10b981" },
      financial_web_search:     { icon: "🌐", color: "#10b981" },
      integrate_web_search:     { icon: "🔗", color: "#3b82f6" },
      generate:                 { icon: "✍️", color: "#2266ff" },
      alpha_generate:           { icon: "✍️", color: "#2266ff" },
      scenario_generate:        { icon: "✍️", color: "#2266ff" },
      generate_chart:           { icon: "📊", color: "#f59e0b" },
      alpha_retrieve:           { icon: "📄", color: "#2266ff" },
      scenario_retrieve:        { icon: "📄", color: "#2266ff" },
    };

    function nodeConfig(node) {
      return NODE_CONFIG[node] || { icon: "⚙️", color: "#555588" };
    }

    // ── API helpers ────────────────────────────────────────────────────────
    const api = {
      async post(path, body) {
        const res = await fetch(BASE + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: "HTTP " + res.status }));
          throw new Error(err.detail || "HTTP " + res.status);
        }
        return res.json();
      },
      async stream(path, body) {
        const res = await fetch(BASE + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: "HTTP " + res.status }));
          throw new Error(err.detail || "HTTP " + res.status);
        }
        return res;
      }
    };

    // ── SSE consumer ──────────────────────────────────────────────────────
    async function consumeSSE(res, onEvent) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split("\n\n");
        buf = parts.pop();
        for (const part of parts) {
          if (!part.trim()) continue;
          const evLine   = part.match(/^event:\s*(.+)$/m);
          const dataLine = part.match(/^data:\s*(.+)$/m);
          if (!evLine || !dataLine) continue;
          let data;
          try { data = JSON.parse(dataLine[1]); } catch { continue; }
          onEvent(evLine[1].trim(), data);
        }
      }
    }

    // ── ActivityFeed — Google ADK style ───────────────────────────────────
    //
    // Uses a HYBRID approach:
    //   • React state → which cards exist, their status, progress bar, final answer
    //   • DOM mutation → streaming text content inside cards (avoids a re-render per token)
    //
    function useActivityFeed() {
      const feedRef  = React.useRef(null);   // container div
      const stateRef = React.useRef({        // mutable, not in React state
        nodeTurnCount: {},                   // node → current turn index
        cardBodyEls:   {},                   // cardId → body DOM element
      });

      // React-controlled parts
      const [cards,    setCards]    = React.useState([]);  // [{id, node, label, icon, color}]
      const [statuses, setStatuses] = React.useState({});  // cardId → {message, done}
      const [progress, setProgress] = React.useState({ step: 0, total: 5, msg: "" });
      const [answer,   setAnswer]   = React.useState(null);
      const [meta,     setMeta]     = React.useState(null);
      const [isDone,   setIsDone]   = React.useState(false);
      const [error,    setError]    = React.useState(null);

      function reset() {
        if (feedRef.current) feedRef.current.innerHTML = "";
        stateRef.current = { nodeTurnCount: {}, cardBodyEls: {} };
        setCards([]); setStatuses({}); setProgress({ step: 0, total: 5, msg: "" });
        setAnswer(null); setMeta(null); setIsDone(false); setError(null);
      }

      function _cardId(node) {
        const turn = stateRef.current.nodeTurnCount[node] || 0;
        return `card-${node}-${turn}`;
      }

      function _ensureCard(node, label) {
        const cardId = _cardId(node);
        if (stateRef.current.cardBodyEls[cardId]) {
          return stateRef.current.cardBodyEls[cardId];  // already exists
        }
        // Add to React state so the card renders
        const cfg = nodeConfig(node);
        setCards(prev => [...prev, { id: cardId, node, label: label || node, icon: cfg.icon, color: cfg.color }]);
        // Return null — the body element will be captured via ref callback
        return null;
      }

      // Called by the card body ref callback once it mounts
      function registerBody(cardId, el) {
        if (el) stateRef.current.cardBodyEls[cardId] = el;
      }

      // Process SSE events
      function handleEvent(event, data) {
        switch (event) {

          case "thinking": {
            const { node, label, content } = data;
            const bodyEl = _ensureCard(node, label);
            if (bodyEl) {
              _appendText(bodyEl, content);
            } else {
              // Card not yet mounted — queue via a short timeout so React renders first
              setTimeout(() => {
                const el = stateRef.current.cardBodyEls[_cardId(node)];
                if (el) _appendText(el, content);
              }, 0);
            }
            break;
          }

          case "tool_call": {
            const { node, label, tool } = data;
            _ensureCard(node, label);
            setTimeout(() => {
              const cardId = _cardId(node);
              const el = stateRef.current.cardBodyEls[cardId];
              if (el) _appendToolBadge(el, tool);
            }, 0);
            break;
          }

          case "status": {
            const { node, label, message, step, total_steps } = data;
            _ensureCard(node, label);
            const cardId = _cardId(node);

            // Remove cursor from body
            setTimeout(() => {
              const el = stateRef.current.cardBodyEls[cardId];
              if (el) { const c = el.querySelector(".cursor"); if (c) c.remove(); }
            }, 0);

            // Mark card done
            setStatuses(prev => ({ ...prev, [cardId]: { message, done: true } }));

            // Progress
            setProgress({ step, total: total_steps, msg: message });

            // Advance turn count so next invocation of this node creates a new card
            stateRef.current.nodeTurnCount[node] = (stateRef.current.nodeTurnCount[node] || 0) + 1;
            break;
          }

          case "answer":
            setAnswer({ content: data.content, chartUrl: data.chart_url || null, agentUsed: data.agent_used || null });
            break;

          case "metadata":
            setMeta(data);
            break;

          case "done":
            setIsDone(true);
            setProgress(p => ({ ...p, step: p.total, msg: "Complete" }));
            break;

          case "error":
            setError(data.message);
            setIsDone(true);
            break;
        }
      }

      return {
        feedRef, registerBody,
        cards, statuses, progress, answer, meta, isDone, error,
        reset, handleEvent,
      };
    }

    // DOM helpers (run outside React render cycle for performance)
    function _appendText(el, text) {
      const cursor = el.querySelector(".cursor");
      if (cursor) cursor.remove();
      el.appendChild(document.createTextNode(text));
      const c = document.createElement("span");
      c.className = "cursor";
      el.appendChild(c);
    }

    function _appendToolBadge(el, toolName) {
      const cursor = el.querySelector(".cursor");
      if (cursor) cursor.remove();
      // Add line break if there's existing text/badges
      if (el.childNodes.length > 0) {
        el.appendChild(document.createElement("br"));
      }
      const badge = document.createElement("span");
      badge.className = "tool-badge";
      badge.textContent = `🔧 ${toolName}`;
      el.appendChild(badge);
      el.appendChild(document.createElement("br"));
      const c = document.createElement("span");
      c.className = "cursor";
      el.appendChild(c);
    }

    // ── AgentCard component ───────────────────────────────────────────────
    function AgentCard({ id, icon, label, color, status, registerBody }) {
      const done = status?.done;
      return (
        <div className="agent-card" style={{ borderColor: done ? color + "44" : "#1e1e26" }}>
          <div className="card-header">
            <span className="card-icon">{icon}</span>
            <span className="card-label" style={{ color: done ? color : "#b8b8d0" }}>{label}</span>
            <span className={`card-status ${done ? "done" : "running"}`}>
              {done
                ? <><span>✓</span> <span>{status.message}</span></>
                : <><div className="status-spinner" /><span>Running…</span></>
              }
            </span>
          </div>
          <div className="card-body" ref={el => registerBody(id, el)} />
        </div>
      );
    }

    // ── ActivityFeed render ───────────────────────────────────────────────
    function ActivityFeed({ feed }) {
      const { feedRef, registerBody, cards, statuses, progress, answer, meta, isDone, error } = feed;
      const pct = progress.total ? Math.round((progress.step / progress.total) * 100) : 0;
      const showFeed = cards.length > 0 || error;

      return (
        <div className="feed-section">
          {error && <div className="error-box">⚠ {error}</div>}

          {showFeed && (
            <>
              <div className="feed-header">
                {!isDone && <div className="feed-header-pulse" />}
                Agent Activity
              </div>

              {/* Progress bar */}
              <div className="progress-row">
                <div className="progress-track">
                  <div className="progress-fill" style={{ width: (isDone ? 100 : pct) + "%" }} />
                </div>
                <div className="progress-msg">{isDone ? "Complete" : (progress.msg || "Running…")}</div>
              </div>

              {/* Agent cards */}
              <div ref={feedRef}>
                {cards.map(c => (
                  <AgentCard
                    key={c.id}
                    id={c.id}
                    icon={c.icon}
                    label={c.label}
                    color={c.color}
                    status={statuses[c.id]}
                    registerBody={registerBody}
                  />
                ))}
              </div>
            </>
          )}

          {/* Final answer */}
          {answer && (
            <div className="answer-panel">
              <div className="answer-label">
                Final Answer
                {answer.agentUsed && <span className="answer-via">via {answer.agentUsed}</span>}
              </div>
              <div className="answer-text">{answer.content}</div>
              {answer.chartUrl && <img className="chart-img" src={answer.chartUrl} alt="Chart" />}
              {meta && (
                <div className="answer-meta">
                  {meta.session_id    && <span className="meta-chip">session: {meta.session_id}</span>}
                  {meta.document_count != null && <span className="meta-chip">{meta.document_count} docs</span>}
                  {meta.message_count != null  && <span className="meta-chip">{meta.message_count} messages</span>}
                  {meta.web_searched  && <span className="meta-chip">🌐 web searched</span>}
                  {meta.vectorstore_quality && <span className="meta-chip">quality: {meta.vectorstore_quality}</span>}
                  {meta.agent_used    && <span className="meta-chip">agent: {meta.agent_used}</span>}
                  {meta.sources?.length > 0 && (
                    <span className="meta-chip">sources: {meta.sources.slice(0, 3).join(", ")}</span>
                  )}
                </div>
              )}
              {isDone && <div className="done-badge">✓ Complete</div>}
            </div>
          )}
        </div>
      );
    }

    // ── ASK TAB ──────────────────────────────────────────────────────────
    function AskTab() {
      const [userId,    setUserId]    = React.useState("test_user");
      const [portName,  setPortName]  = React.useState("Test Portfolio");
      const [tickers,   setTickers]   = React.useState("AAPL, MSFT");
      const [portfolio, setPortfolio] = React.useState(null);
      const [session,   setSession]   = React.useState(null);
      const [query,     setQuery]     = React.useState("");
      const [loading,   setLoading]   = React.useState("");
      const [stepError, setStepError] = React.useState("");
      const [streaming, setStreaming] = React.useState(false);

      const feed = useActivityFeed();

      async function createPortfolio() {
        setLoading("portfolio"); setStepError("");
        try {
          const tickerList = tickers.split(",").map(t => t.trim()).filter(Boolean);
          const data = await api.post("/portfolios/", { user_id: userId, name: portName, tickers: tickerList });
          setPortfolio({ id: data.id, name: data.name, tickers: data.tickers });
        } catch (e) { setStepError(e.message); }
        setLoading("");
      }

      async function createSession() {
        setLoading("session"); setStepError("");
        try {
          const data = await api.post("/portfolios/sessions", {
            portfolio_id: portfolio.id, user_id: userId, agent_type: "rag",
          });
          setSession({ thread_id: data.thread_id });
        } catch (e) { setStepError(e.message); }
        setLoading("");
      }

      async function runAsk() {
        feed.reset();
        setStreaming(true);
        try {
          const res = await api.stream("/ask", { query, thread_id: session.thread_id });
          await consumeSSE(res, feed.handleEvent);
        } catch (e) {
          feed.handleEvent("error", { message: e.message });
        }
        setStreaming(false);
      }

      function reset() {
        setPortfolio(null); setSession(null); setStepError("");
        setQuery(""); feed.reset();
      }

      return (
        <div>
          {/* Step 1 */}
          {!portfolio ? (
            <div className="form-card">
              <div className="form-card-title">Step 1 — Create Portfolio</div>
              <div className="grid-2">
                <div className="field"><label>User ID</label><input value={userId} onChange={e => setUserId(e.target.value)} /></div>
                <div className="field"><label>Portfolio Name</label><input value={portName} onChange={e => setPortName(e.target.value)} /></div>
              </div>
              <div className="field"><label>Tickers (comma-separated)</label><input value={tickers} onChange={e => setTickers(e.target.value)} placeholder="AAPL, MSFT, GOOGL" /></div>
              <div className="btn-row">
                <button className="btn btn-primary" onClick={createPortfolio} disabled={loading === "portfolio"}>
                  {loading === "portfolio" ? "Creating…" : "Create Portfolio"}
                </button>
              </div>
            </div>
          ) : (
            <div className="step-indicator">
              <div className="step-check">✓</div>
              Portfolio: <strong>{portfolio.name}</strong> (ID {portfolio.id})
              &nbsp;—&nbsp;{portfolio.tickers?.join(", ")}
            </div>
          )}

          {/* Step 2 */}
          {portfolio && !session && (
            <div className="form-card">
              <div className="form-card-title">Step 2 — Create RAG Session</div>
              <div className="btn-row">
                <button className="btn btn-primary" onClick={createSession} disabled={loading === "session"}>
                  {loading === "session" ? "Creating…" : "Create Session"}
                </button>
              </div>
            </div>
          )}
          {session && (
            <div className="step-indicator">
              <div className="step-check">✓</div>
              Session: <code style={{ fontSize: "0.8rem", color: "#6677cc" }}>{session.thread_id}</code>
            </div>
          )}

          {/* Step 3 */}
          {session && (
            <div className="form-card">
              <div className="form-card-title">Step 3 — Ask</div>
              <div className="field"><label>Query</label>
                <textarea value={query} onChange={e => setQuery(e.target.value)}
                  placeholder="What is Apple's revenue growth over the last 3 years?" rows={3} />
              </div>
              <div className="btn-row">
                <button className="btn btn-primary" onClick={runAsk} disabled={!query || streaming}>
                  {streaming ? "Streaming…" : "Run"}
                </button>
                <button className="btn btn-ghost" onClick={reset}>Reset</button>
              </div>
            </div>
          )}

          {stepError && <div className="error-box">{stepError}</div>}
          <ActivityFeed feed={feed} />
        </div>
      );
    }

    // ── COMPARE TAB ───────────────────────────────────────────────────────
    function CompareTab() {
      const [userId, setUserId] = React.useState("test_user");
      const [c1,   setC1]   = React.useState("");
      const [c2,   setC2]   = React.useState("");
      const [c3,   setC3]   = React.useState("");
      const [year, setYear] = React.useState("");
      const [streaming, setStreaming] = React.useState(false);
      const feed = useActivityFeed();

      async function runCompare() {
        feed.reset();
        setStreaming(true);
        try {
          const body = { company1: c1, company2: c2, user_id: userId };
          if (c3.trim()) body.company3 = c3.trim();
          if (year.trim()) body.year = parseInt(year.trim());
          const res = await api.stream("/compare", body);
          await consumeSSE(res, feed.handleEvent);
        } catch (e) {
          feed.handleEvent("error", { message: e.message });
        }
        setStreaming(false);
      }

      return (
        <div>
          <div className="form-card">
            <div className="form-card-title">Compare Companies</div>
            <div className="field"><label>User ID</label><input value={userId} onChange={e => setUserId(e.target.value)} /></div>
            <div className="grid-2">
              <div className="field"><label>Company 1</label><input value={c1} onChange={e => setC1(e.target.value)} placeholder="Apple" /></div>
              <div className="field"><label>Company 2</label><input value={c2} onChange={e => setC2(e.target.value)} placeholder="Microsoft" /></div>
            </div>
            <div className="grid-2">
              <div className="field"><label>Company 3 (optional)</label><input value={c3} onChange={e => setC3(e.target.value)} placeholder="Google" /></div>
              <div className="field"><label>Year (optional)</label><input value={year} onChange={e => setYear(e.target.value)} placeholder="2024" /></div>
            </div>
            <div className="btn-row">
              <button className="btn btn-primary" onClick={runCompare} disabled={!c1 || !c2 || streaming}>
                {streaming ? "Streaming…" : "Compare"}
              </button>
            </div>
          </div>
          <ActivityFeed feed={feed} />
        </div>
      );
    }

    // ── QUANT TAB ─────────────────────────────────────────────────────────
    function QuantTab() {
      const [userId,    setUserId]    = React.useState("test_user");
      const [query,     setQuery]     = React.useState("");
      const [sessionId, setSessionId] = React.useState("");
      const [streaming, setStreaming] = React.useState(false);
      const feed = useActivityFeed();

      async function runQuery() {
        feed.reset();
        setStreaming(true);
        try {
          const body = { query, user_id: userId };
          if (sessionId.trim()) body.session_id = sessionId.trim();
          const res = await api.stream("/quant/query", body);
          await consumeSSE(res, (event, data) => {
            // Capture session_id from metadata for continuity
            if (event === "metadata" && data.session_id && !sessionId) {
              setSessionId(data.session_id);
            }
            feed.handleEvent(event, data);
          });
        } catch (e) {
          feed.handleEvent("error", { message: e.message });
        }
        setStreaming(false);
      }

      return (
        <div>
          <div className="form-card">
            <div className="form-card-title">Quant Multi-Agent Query</div>
            <div className="grid-2">
              <div className="field"><label>User ID</label><input value={userId} onChange={e => setUserId(e.target.value)} /></div>
              <div className="field"><label>Session ID (blank = new session)</label>
                <input value={sessionId} onChange={e => setSessionId(e.target.value)} placeholder="Auto-generated" />
              </div>
            </div>
            <div className="field"><label>Query</label>
              <textarea value={query} onChange={e => setQuery(e.target.value)} rows={3}
                placeholder="e.g. What is Apple's stock price and 200-day SMA?" />
            </div>
            <div className="btn-row">
              <button className="btn btn-primary" onClick={runQuery} disabled={!query || streaming}>
                {streaming ? "Streaming…" : "Run"}
              </button>
              <button className="btn btn-ghost" onClick={() => { feed.reset(); setSessionId(""); }}>
                New Session
              </button>
            </div>
          </div>
          <ActivityFeed feed={feed} />
        </div>
      );
    }

    // ── App root ──────────────────────────────────────────────────────────
    const TABS = [
      { id: "ask",     icon: "💬", label: "RAG Ask" },
      { id: "compare", icon: "⚖️",  label: "RAG Compare" },
      { id: "quant",   icon: "📈", label: "Quant" },
    ];

    function App() {
      const [tab, setTab] = React.useState("ask");
      return (
        <div className="layout">
          <div className="sidebar">
            <div className="sidebar-title">Investment Analyst</div>
            {TABS.map(t => (
              <button key={t.id} className={`nav-btn ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                <span className="nav-icon">{t.icon}</span>
                {t.label}
              </button>
            ))}
          </div>
          <div className="main">
            {tab === "ask"     && <><div className="page-title">RAG Ask</div><div className="page-sub">Document-grounded investment analysis with real-time streaming</div><AskTab /></>}
            {tab === "compare" && <><div className="page-title">RAG Compare</div><div className="page-sub">Multi-company comparison with chart generation</div><CompareTab /></>}
            {tab === "quant"   && <><div className="page-title">Quant Analysis</div><div className="page-sub">Multi-agent stock analysis — supervisor routes to specialised sub-agents</div><QuantTab /></>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
